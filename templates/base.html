<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cucumber Events{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ cache_bust }}">
</head>
<body>
  <header>
    <a class="brand" href="/">
      <img src="/cucumber_logo.png" alt="Cucumber" onerror="this.style.display='none'">
      <span>Events Studio</span>
    </a>
    <nav class="header-tabs">
      <a class="header-tab {% if request.path == '/' or request.path.startswith('/events') %}header-tab--active{% endif %}"
         href="/">Image Generator</a>
      <a class="header-tab {% if request.path.startswith('/email') %}header-tab--active{% endif %}"
         href="/email-template">Email Template</a>
      <a class="header-tab {% if request.path.startswith('/care-news') %}header-tab--active{% endif %}"
         href="/care-news">Care News</a>
    </nav>
    <a class="btn" href="/events/new">+ New Event</a>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
      <div class="flash flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
