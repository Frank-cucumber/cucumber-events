services:
  - type: web
    name: cucumber-events
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: ANTHROPIC_AUTH_TOKEN
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
